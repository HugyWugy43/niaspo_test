worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  upstream frontend_upstream {
    server frontend:80;
  }

  upstream backend_upstream {
    server backend:8080;
  }

  upstream swagger_upstream {
    server swagger:8080;
  }

  upstream adminer_upstream {
    server adminer:8080;
  }

  server {
    listen 80;

    # Статика фронтенда
    location / {
      proxy_pass http://frontend_upstream;
    }

    # API backend
    location /api/ {
      proxy_pass http://backend_upstream;
    }

    # OpenAPI spec (для Swagger UI)
    location = /api-docs.json {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
    }

    # Swagger UI — документация API
    location /swagger {
      return 302 /swagger/;
    }
    location /swagger/ {
      proxy_pass http://swagger_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Prefix /swagger;
    }

    # Adminer — администрирование БД
    location /adminer {
      return 302 /adminer/;
    }
    location /adminer/ {
      proxy_pass http://adminer_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}

