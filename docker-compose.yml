version: "3.9"

services:
  proxy:
    build: ./proxy
    image: dev-env-proxy:latest
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
      - pgadmin
    networks:
      - app-net

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@localhost
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_SCRIPT_NAME: /pgadmin
    networks:
      - app-net

  frontend:
    build: ./frontend
    image: dev-env-frontend:latest
    networks:
      - app-net

  backend:
    build: ./backend
    image: dev-env-backend:latest
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      - db
      - redis
    networks:
      - app-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  db-data:

