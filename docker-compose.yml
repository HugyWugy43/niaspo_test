version: "3.9"

services:
  proxy:
    build: ./proxy
    image: dev-env-proxy:latest
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app-net

  pgadmin:
    image: dpage/pgadmin4:8
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: rodionovmax28@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_LISTEN: "0.0.0.0"
    networks:
      - app-net

  # Adminer — лёгкая альтернатива pgAdmin, если интерфейс pgAdmin не открывается
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    networks:
      - app-net

  frontend:
    build: ./frontend
    image: dev-env-frontend:latest
    networks:
      - app-net

  backend:
    build: ./backend
    image: dev-env-backend:latest
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      - db
      - redis
    networks:
      - app-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  db-data:

