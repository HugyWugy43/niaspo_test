<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Документация API — Тестовая среда</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <header class="header">
      <h1>Документация API</h1>
      <p class="header-link"><a href="index.html">← На главную</a></p>
    </header>

    <main class="container container--docs">
      <section class="panel">
        <h2>Список эндпоинтов</h2>
        <div id="apiDocsList" class="api-docs-list"></div>
      </section>
    </main>

    <footer class="footer">
      <span>Тестовая среда разработчика</span>
    </footer>

    <script>
      (async function () {
        const el = document.getElementById('apiDocsList');
        el.textContent = 'Загрузка...';
        function escapeHtml(s) {
          const div = document.createElement('div');
          div.textContent = s;
          return div.innerHTML;
        }
        try {
          const resp = await fetch('/api/api-docs');
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const spec = await resp.json();
          el.innerHTML = '';
          if (!spec.paths || typeof spec.paths !== 'object') {
            el.textContent = 'Нет данных.';
            return;
          }
          for (const [path, methods] of Object.entries(spec.paths)) {
            for (const [method, info] of Object.entries(methods)) {
              if (method.startsWith('/') || !info || typeof info !== 'object') continue;
              const summary = (info.summary || method).trim();
              const div = document.createElement('div');
              div.className = 'api-docs-item';
              const methodClass = 'api-method api-method--' + method.toLowerCase();
              div.innerHTML = '<span class="' + methodClass + '">' + method.toUpperCase() + '</span> <span class="api-path">' + escapeHtml(path) + '</span> — ' + escapeHtml(summary);
              el.appendChild(div);
            }
          }
        } catch (err) {
          el.textContent = 'Ошибка: ' + err.message;
        }
      })();
    </script>
  </body>
</html>
