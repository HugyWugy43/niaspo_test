# ServiceAccount и токен для доступа к кластеру из CI (без exec/yc).
# Применить один раз локально: kubectl apply -f k8s/sa-for-ci.yaml
# Затем получить токен и собрать статический kubeconfig (см. README или инструкцию ниже).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deploy
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ci-deploy-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: ci-deploy
    namespace: kube-system
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: ci-deploy-token
  namespace: kube-system
  annotations:
    kubernetes.io/service-account.name: "ci-deploy"
