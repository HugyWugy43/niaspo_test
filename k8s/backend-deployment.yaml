apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dev-env
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: dev-env-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_HOST
              value: db
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: devuser
            - name: POSTGRES_PASSWORD
              value: devpass
            - name: POSTGRES_DB
              value: devdb
            - name: REDIS_URL
              value: redis://redis:6379
            - name: NODE_ENV
              value: production
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: dev-env
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080

