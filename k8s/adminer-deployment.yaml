apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: dev-env
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: dev-env
spec:
  type: LoadBalancer
  selector:
    app: adminer
  ports:
    - name: http
      port: 8080
      targetPort: 8080

