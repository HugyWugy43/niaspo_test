# Права для чтения логов подов в namespace dev-env (для backend, чтобы отдавать логи на фронт)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: read-pod-logs
  namespace: dev-env
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-read-logs
  namespace: dev-env
subjects:
  - kind: ServiceAccount
    name: default
    namespace: dev-env
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: read-pod-logs
