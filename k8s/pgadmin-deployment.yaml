apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: dev-env
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:8
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: rodionovmax28@gmail.com
            - name: PGADMIN_DEFAULT_PASSWORD
              value: admin
            - name: PGADMIN_CONFIG_SERVER_MODE
              value: "True"
            - name: PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED
              value: "False"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: dev-env
spec:
  type: LoadBalancer
  selector:
    app: pgadmin
  ports:
    - name: http
      port: 5050
      targetPort: 80
